services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: baby_app
      POSTGRES_USER: baby_app
      POSTGRES_PASSWORD: baby_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baby_app -d baby_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
